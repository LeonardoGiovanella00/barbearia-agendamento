<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Painel de Agendamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGIN OVERLAY -->
  <div class="login-overlay" id="login-overlay">
    <div class="login-box">
      <div style="font-size:2.5rem; margin-bottom:1rem;">💈</div>
      <h2 id="login-titulo">Painel Admin</h2>
      <p>Digite a senha para acessar</p>
      <input type="password" id="input-senha" class="input-glass" placeholder="Senha" onkeydown="if(event.key==='Enter') fazerLogin()" />
      <div class="erro-login" id="erro-login">Senha incorreta.</div>
      <button class="btn-login" onclick="fazerLogin()" style="margin-top:1rem;">Entrar</button>
    </div>
  </div>

  <!-- ADMIN PAGE -->
  <div id="admin-page" style="display:none;">

    <header class="admin-header">
      <h1>💈 <span id="admin-titulo">Barbearia X</span> — Painel Admin</h1>
      <span id="admin-subtitulo">Agendamentos</span>
      <button onclick="sair()" style="background:none;border:1px solid rgba(255,255,255,0.1);color:var(--text-muted);font-family:Outfit,sans-serif;padding:0.4rem 1rem;border-radius:8px;cursor:pointer;font-size:0.85rem;">Sair</button>
    </header>

    <div class="admin-body">

      <!-- STATS -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Agendamentos Hoje</div>
          <div class="stat-value" id="stat-hoje">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Geral</div>
          <div class="stat-value" id="stat-total">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Faturamento Hoje</div>
          <div class="stat-value" id="stat-fat">R$ 0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Próximo Horário</div>
          <div class="stat-value" id="stat-prox" style="font-size:1.2rem;">—</div>
        </div>
      </div>

      <!-- TOOLBAR -->
      <div class="admin-toolbar">
        <input type="date" id="filtro-data" class="input-glass" />
        <select id="filtro-barbeiro" class="input-glass" style="max-width:200px;cursor:pointer;">
          <option value="">Todos os barbeiros</option>
        </select>
        <button onclick="exportarCSV()" style="background:rgba(201,168,76,0.15);border:1px solid rgba(201,168,76,0.3);color:var(--gold);font-family:Outfit,sans-serif;padding:0.6rem 1.2rem;border-radius:10px;cursor:pointer;font-size:0.85rem;font-weight:600;">📥 Exportar CSV</button>
        <button onclick="limparTodos()" style="background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.2);color:#e74c3c;font-family:Outfit,sans-serif;padding:0.6rem 1.2rem;border-radius:10px;cursor:pointer;font-size:0.85rem;font-weight:600;">🗑️ Limpar Todos</button>
      </div>

      <!-- TABELA -->
      <div class="tabela-wrap">
        <table id="tabela-agendamentos">
          <thead>
            <tr>
              <th>Cliente</th>
              <th>WhatsApp</th>
              <th>Serviço</th>
              <th>Barbeiro</th>
              <th>Data</th>
              <th>Horário</th>
              <th>Valor</th>
              <th>Status</th>
              <th>Ação</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
        <div class="empty-state" id="empty-state" style="display:none;">
          <div class="empty-icon">📅</div>
          <p>Nenhum agendamento encontrado.</p>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
  <script src="admin.js"></script>
</body>
</html>
